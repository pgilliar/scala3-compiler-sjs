<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scala Browser IDE</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <div class="filebar">
        <div id="file-tabs" class="file-tabs" role="tablist" aria-label="Scala files"></div>
        <div class="file-tools">
          <input id="file-path" class="file-path" type="text" spellcheck="false" aria-label="Current file path">
          <button id="add-file-button" type="button">New File</button>
          <button id="delete-file-button" type="button">Delete</button>
        </div>
      </div>

      <textarea id="source" spellcheck="false"></textarea>

      <div class="controls">
        <select id="example-select" aria-label="Example">
          <option value="hello">Hello World</option>
          <option value="multi">Multiple Files</option>
          <option value="authorMacro">Author Macro</option>
        </select>
        <span id="compile-timer" class="compile-timer" aria-live="polite" hidden></span>
        <input id="import-macro-input" type="file" accept=".jar,.zip,.json" multiple hidden>
        <button id="import-macro-button" type="button" disabled>Import Macro</button>
        <button id="run-button" type="button" disabled>Run</button>
      </div>

      <div class="terminal">
        <pre id="output" class="output"></pre>
        <form id="terminal-form" class="terminal-form" hidden>
          <span class="terminal-prefix">&gt;</span>
          <input id="terminal-input" class="terminal-input" type="text" autocomplete="off" spellcheck="false">
        </form>
      </div>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
